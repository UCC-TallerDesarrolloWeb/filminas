### 1. Diseño Web Adaptable

![Web Adaptable](images/css/img-dispositius.png)

----

### 1. Diseño Web Adaptable
- Enfocarse en el desarrollo móvil primero
- Emplear unidades relativas (%, rem, vw/vh) y contenidos fluídos 
- Probar en dispositivos reales
- Verificar que el sitio sea responsivo

----

### 1. Diseño Web Adaptable
- Si bien es complicado de adoptar en etapas de tempranas de desarrollo, 
trae aparejada gran cantidad de ventajas y evita modificaciones a futuro
que podrían ser complejas de implementar.

---

## 2. Optimización de rendimiento

- Eliminar código innecesario: HTML, CSS, Js
- Optimización de imágenes (comprimirlas intentando no perder calidad, implementar carga diferida)
- Minimizar archivos **CSS, JS e imágenes**.  
- Usar **lazy loading** para recursos pesados.  
- Implementar **caché** (HTTP, CDN, Service Workers).  
- Optimizar consultas a base de datos.  
- Analizar con herramientas:
  - **[Lighthouse](https://chromewebstore.google.com/detail/lighthouse/blipmdconlkpinefehnmjammfjpmpbjk?hl=es)**
  - **[PageSpeed Insights](https://pagespeed.web.dev/)**
  - **Web Vitals**

---

## 3. Accesibilidad (A11y)

Descuidar la accesibilidad puede alejar a una parte significativa de su público objetivo. 
Además, no cumplir con los estándares de accesibilidad puede conllevar repercusiones legales 
bajo leyes como la Ley de Estadounidenses con Discapacidades (ADA) en EE. UU., la Sección 508 y 
la Ley Europea de Accesibilidad (EAA).

----

## 3. Accesibilidad (A11y)

- Cumplir con los estándares [WCAG](https://www.w3.org/WAI/standards-guidelines/wcag/es) 2.1 AA
- Diseñar para **todos los usuarios**, incluyendo personas con discapacidad.  
- Usar etiquetas **semánticas HTML** correctamente.  
- Incluir **textos alternativos** (`alt`) en imágenes.  
- Utilizar herramientas de pruebas de accesibilidad
- Asegurar **contraste de color** adecuado.  
- Permitir navegación con **teclado y lectores de pantalla**.

----

## Herramientas de accesibilidad

- **[Lighthouse Accessibility Audit](https://chromewebstore.google.com/detail/lighthouse/blipmdconlkpinefehnmjammfjpmpbjk?hl=es)**  
- **[axe DevTools](https://chromewebstore.google.com/detail/axe-devtools-web-accessib/lhdoppojpmngadmnindnejefpokejbdd)**  
- **WAVE Evaluation Tool**  
- **Chrome DevTools → Accessibility panel**

---

### 4. Search Engine Optimization (SEO)
<!-- .slide: style="font-size: 0.80em" -->
La optimización para motores de búsqueda (SEO) consiste en optimizar el sitio web para aumentar su 
visibilidad en buscadores como Google. 

Al optimizar el contenido y configuración técnica se atrae más tráfico orgánico (gratuito) de personas 
que buscan información relacionada con el negocio. 

Esto implica comprender qué busca el público objetivo (investigación de palabras clave) y adaptar el 
contenido del sitio web para satisfacer esas necesidades. 

El SEO consiste en hacer que el sitio web sea fácilmente detectable tanto por los motores de búsqueda 
como por los usuarios.

----

### 4. Search Engine Optimization (SEO)
- Emplea palabras claves para el contenido
- Plantear una estructura de navegación lógica y clara
- Uso de etiquetas semánticas meta: títulos, metadescripciones, etiquetas de encabezado
- UX/performance también influyen en ranking.

---

### 5. Seguridad
Una brecha de seguridad puede tener incurrir en pérdidas financieras o en daños a la reputación de la empresa.

----

## 5. Seguridad

- Validar y sanitizar toda la **entrada de datos**.  
- Usar **HTTPS** y certificados válidos.  
- Implementar **autenticación y autorización seguras** (JWT, OAuth2).  
- Mantener dependencias actualizadas y usar análisis de vulnerabilidades ([Snyk](https://snyk.io/)).
- Realizar auditorías de seguridad periódicas

---

### 6. Arquitectura modular & componentes
**Beneficios:** mantenibilidad, escalabilidad, paralelismo de equipos.
- Componentes reutilizables que reciban parámetros de entrada y salida claros.
- Separación de capas (UI ↔ lógica ↔ datos).
- Estándares de **naming** y estructura por feature.
- Documentar componentes (Storybook) y contratos (OpenAPI).

---

### 7. Control de versiones & CI/CD
Mejoran y agilizan todo el proceso de desarrollo, introduciendo un mayor nivel de automatización,
mejorando la fiabilidad y la colaboración.

----

### 7. Control de versiones & CI/CD
**Git** como fuente de verdad; pipelines automatizados.
- Estrategia de ramas (GitFlow/Trunk) + PRs con revisión.
- Tests **unitarios/integración/e2e** en CI.
- Deploys reproducibles; feature flags.
- Calidad: linters/pre-commit, coverage, escaneo de seguridad.

---

### 8. Estrategia de contenido & Arquitectura de la información

El contenido debe estar correctamente estructurado y presentado para que el usuario
**encuentre** y **entienda**.

Se debe establecer un sistema de navegación intuitivo y garantizar que el contenido 
satisfaga las necesidades de los usuarios.

----

### 8. Estrategia de contenido & Arquitectura de la información

- Definir audiencias, tareas y vocabulario.
- Navegación clara, etiquetas y taxonomías consistentes.
- Plantillas y patrones editoriales.
- Medir búsquedas internas y rutas de usuario.

---

### 9. Mejora progresiva (progressive enhancement)
Este enfoque se centra en construir una base sólida que funcione para todos, 
y luego implementar mejoras adicionales para quienes tengan navegadores y dispositivos más potentes.

----

### 9. Mejora progresiva (progressive enhancement)

**Base robusta para todos**, mejoras para navegadores capaces.
- Contenido y navegación **funcionales sin JS** crítico.
- Cargar progresivamente funcionalidades ricas.
- *Graceful degradation* para entornos limitados.

---

### 10. Supervisión y análisis del rendimiento
Implica implementar herramientas y procesos para monitorizar diversos aspectos del rendimiento, 
el comportamiento del usuario y las tasas de conversión de su sitio web.

Permite obtener información valiosa para identificar cuellos de botella, optimizar la experiencia del usuario y 
tomar decisiones informadas sobre las futuras prioridades de desarrollo.

----

### 10. Supervisión y análisis del rendimiento
**Ciclo de mejora continua.**
- Logs, métricas, alertas; tableros por **SLO/SLI**. (Objetivo/Indicador de Nivel de Servicio)
- Medir **Core Web Vitals** en producción.
- Analítica con privacidad (consentimiento/retención).
